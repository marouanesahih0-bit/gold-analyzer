name: Update Gold Analyzer Data

on:
  schedule:
    # يعمل كل 6 ساعات (4 مرات في اليوم): 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: {}  # يسمح بتشغيله يدوياً من تبويب Actions في GitHub

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit and push data.json if changed
        run: |
          git config user.name "gold-analyzer-bot"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Auto-update data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
